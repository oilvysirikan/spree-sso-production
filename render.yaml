services:
  - type: web
    name: spree-backend
    runtime: ruby
    plan: free
    buildCommand: bundle install && bundle exec rails assets:precompile && bundle exec rails db:prepare
    startCommand: bundle exec puma -C config/puma.rb
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: spree-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: spree-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: RAILS_LOG_LEVEL
        value: info
      - key: RAILS_ENV
        value: production
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: ENTRA_TENANT_ID
        sync: false
      - key: ENTRA_CLIENT_ID
        sync: false
      - key: ENTRA_CLIENT_SECRET
        sync: false
      - key: SPREE_PUBLISHABLE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  # uncomment to add background jobs, requires standard (paid) plan
  # - type: worker
  #   name: spree-worker
  #   runtime: ruby
  #   plan: standard
  #   buildCommand: bundle install && bundle exec rails assets:precompile
  #   startCommand: bundle exec sidekiq
  #   envVars:
  #     - key: DATABASE_URL
  #       fromDatabase:
  #         name: spree-db
  #         property: connectionString
  #     - key: REDIS_URL
  #       fromService:
  #         name: spree-redis
  #         type: redis
  #         property: connectionString
  #     - key: SECRET_KEY_BASE
  #       fromService:
  #         name: spree
  #         type: web
  #         envVarKey: SECRET_KEY_BASE
  #     - key: SIDEKIQ_CONCURRENCY
  #       value: "25"
  #     - key: RAILS_MAX_THREADS
  #       value: "27"

  - type: redis
    name: spree-redis
    plan: free
    # maxmemoryPolicy: noeviction
    ipAllowList: []

  # uncomment to enable dedicated cache redis
  # - type: redis
  #   name: spree-redis-cache
  #   plan: free
  #   maxmemoryPolicy: allkeys-lru
  #   ipAllowList: []

databases:
  - name: spree-db
    plan: free
    databaseName: spree
    postgresMajorVersion: "18"
    ipAllowList: []
